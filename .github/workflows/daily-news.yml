name: Daily AI News Fetch & Deploy

on:
  schedule:
    # Runs at 00:00 UTC (9:00 AM JST) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Needed to push the generated JSON back to the repo and deploy

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Translate News via Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node fetchNews.js

      - name: Commit Updated News JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/dailyNews.json
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Daily AI news update"
          git push

      - name: Build React App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
