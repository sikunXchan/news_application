name: Daily AI News Fetch & Deploy

on:
  schedule:
    # Runs at 00:00 UTC (9:00 AM JST) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Translate News via Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node fetchNews.js

      - name: Commit Updated News JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/dailyNews.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Daily AI news update $(date -u +'%Y-%m-%d')"
          git push

      - name: Build React App
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: fetch-news
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
